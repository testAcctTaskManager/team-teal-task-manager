name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: task-manager/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: task-manager

      - name: Run ESLint
        run: npm run lint
        working-directory: task-manager
