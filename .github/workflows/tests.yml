name: Tests (Vitest + Cypress)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-manager

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: task-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply local D1 migrations
        run: npm run cf:migrate:local

      - name: Seed local D1 with sample data
        run: npm run cf:seed:local

      - name: Vitest Components (with minimum 75% coverage required)
        run: npm run test:vitest

      - name: Get Vitest Components coverage summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require("fs");
          const p = "coverage/unit/coverage-summary.json";

          if (!fs.existsSync(p)) {
            console.error("Unit coverage summary not found.");
            process.exit(1);
          }

          const t = JSON.parse(fs.readFileSync(p, "utf8")).total;
          const lines = [
            "Unit Coverage",
            `Lines: ${t.lines.pct}%`,
            `Statements: ${t.statements.pct}%`,
            `Functions: ${t.functions.pct}%`,
            `Branches: ${t.branches.pct}%`,
          ];

          const out = lines.join("\n");
          console.log(out);

          if (process.env.GITHUB_STEP_SUMMARY) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, out + "\n");
          }
          NODE

      - name: Upload Vitest Components unit coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: task-manager/coverage/unit
          if-no-files-found: error
          retention-days: 14

      - name: Cypress Component Tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          working-directory: task-manager
          command: npm run test:ct

  integration:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: task-manager

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: task-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .dev.vars for test JWT
        run: echo "JWT_SECRET=shhhh_its_a_secret" > .dev.vars

      - name: DB-backed integration tests (Wrangler + D1)
        run: npm run test:integration

