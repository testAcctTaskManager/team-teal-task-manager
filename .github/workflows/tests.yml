name: Tests (Vitest + Cypress)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-manager

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: task-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply local D1 migrations
        run: npm run cf:migrate:local

      - name: Seed local D1 with sample data
        run: npm run cf:seed:local

      - name: Vitest
        run: npm run test:vitest

      - name: Cypress Component Tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          working-directory: task-manager
          command: npm run test:ct

  integration:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: task-manager

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: task-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .dev.vars for test JWT
        run: echo "JWT_SECRET=shhhh_its_a_secret" > .dev.vars

      - name: DB-backed integration tests (Wrangler + D1)
        run: npm run test:integration

